<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Pass System - Register</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo">Bus Pass System</a>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
            </ul>
        </nav>
        <div>
            <a href="login.html" class="btn-primary" style="background: transparent; border: 1px solid var(--accent-1); color: var(--accent-1); margin-right: 1rem;">Log In</a>
        </div>
    </header>

    <main>
        <div class="auth-container">
            <div class="auth-header">
                <h1>Create Account</h1>
                <p style="color: var(--text-muted);">Join Bus Pass System to manage your passes.</p>
            </div>
            
            <form id="register-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="john_doe" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="john@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <button type="submit" class="btn-primary" style="width: 100%;">Sign Up</button>
                </div>
            </form>
            
            <div class="switch-auth">
                <p>Already have an account? <a href="login.html">Log In</a></p>
            </div>
        </div>
    </main>

    <div id="toast-container"></div>
    <script src="js/api.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const un = document.getElementById('username').value;
            const em = document.getElementById('email').value;
            const pw = document.getElementById('password').value;
            register(un, em, pw);
        });
    </script>
</body>
</html>
