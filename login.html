<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Pass System - Log In</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo">Bus Pass System</a>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
            </ul>
        </nav>
        <div>
            <a href="register.html" class="btn-primary">Sign Up</a>
        </div>
    </header>

    <main>
        <div class="auth-container">
            <div class="auth-header">
                <h1>Welcome Back</h1>
                <p style="color: var(--text-muted);">Please log in to view your passes.</p>
            </div>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="john_doe" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <button type="submit" class="btn-primary" style="width: 100%;">Log In</button>
                </div>
            </form>
            
            <div class="switch-auth">
                <p>New here? <a href="register.html">Sign Up</a></p>
            </div>
        </div>
    </main>

    <div id="toast-container"></div>
    <script src="js/api.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const un = document.getElementById('username').value;
            const pw = document.getElementById('password').value;
            login(un, pw);
        });
    </script>
</body>
</html>
